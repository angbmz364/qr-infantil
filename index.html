<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Infantil Seguro</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="contenedor">
      <div class="icono">🛡️</div>

      <h1>QR Infantil Seguro</h1>

      <p>Complete los datos para generar el QR.</p>

      <input type="text" id="nino" required placeholder="Nombre del niño" />
      <input type="text" id="apoderado" required  placeholder="Nombre del apoderado" />
      <input type="text" id="telefono" required  placeholder="Número de celular" />
      <input type="text" id="direccion" required placeholder="Dirección" />
      <input type="text" id="redes" placeholder="Red social (opcional)" />
      <input type="text" id="medicamentos" placeholder="Medicamentos (opcional)"/>
      <input type="text" id="alergias" placeholder="Alergias (opcional)" />
      <input
        type="text"
        id="importante"
        placeholder="Información importante (opcional)"
      />

      <button id="generateQR">Generar Código QR</button>
      
      <div id="resultado"></div>
    </main>
    <script src="scripts.js"></script>
  </body>
</html>
